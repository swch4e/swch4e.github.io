<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>블록체인 채굴 게임</title>
<style>

  .app { max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:24px; }

  body.student .card { background:#1e293b; border:1px solid #334155; }

  body.login .app { background:#0f172a; }
  body.login .header { background:linear-gradient(135deg,#475569,#334155); }
  body.login .card { background:#1e293b; border:1px solid #334155; }
  body.login input, body.login select { background:#0f172a; color:#e2e8f0; border:1px solid #475569; }

  .scroll-x { overflow-x:auto; }

  /* === 정보 바 (교수) === */

  /* === 블록체인 시각화 === */

  .chain { display:flex; align-items:stretch; gap:0; min-width:min-content; }

  .chain-block .bh { font-size:10px; font-weight:800; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; }
  .chain-block .bl { display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px dotted rgba(255,255,255,.15); }
  .chain-block .bl:last-child { border-bottom:none; }
  .chain-block .bl .lk2 { opacity:.65; }
  .chain-block .bl .vv { font-weight:700; max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right; }

  body.student .chain-block { background:#1e293b; border-color:#334155; }

  .chain-link { flex:0 0 auto; align-self:center; font-size:16px; color:#64748b; padding:0 2px; }
  .chain-block .hashval { color:#6ee7b7; }

  /* === 최종 결과 화면 === */
  .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin:10px 0; }
  .stat-box { border-radius:10px; padding:12px; text-align:center; }
  body.teacher .stat-box { background:#072019; border:1px solid #1d4d40; }
  body.student .stat-box { background:#0f172a; border:1px solid #334155; }
  .stat-box .sv { font-size:22px; font-weight:800; color:#34d399; }
  .stat-box .sl { font-size:10px; color:#94a3b8; margin-top:3px; }
  .podium { display:flex; align-items:flex-end; justify-content:center; gap:8px; margin:16px 0; }
  .pod { flex:1; max-width:100px; border-radius:10px 10px 0 0; padding:10px 4px; text-align:center; }
  .pod .pn { font-size:12px; font-weight:700; color:#fff; }
  .pod .ps { font-size:11px; color:rgba(255,255,255,.85); }
  .pod .pm { font-size:22px; }
  .pod.p1 { background:linear-gradient(180deg,#fbbf24,#d97706); height:120px; }
  .pod.p2 { background:linear-gradient(180deg,#cbd5e1,#64748b); height:95px; }
  .pod.p3 { background:linear-gradient(180deg,#d8a06c,#b45309); height:75px; }

  .mode-banner { background:rgba(251,191,36,.15); border:1px solid rgba(251,191,36,.4); border-radius:8px; padding:8px 10px; font-size:11px; color:#fcd34d; margin-bottom:12px; text-align:center; line-height:1.5; }

  /* === 방 코드 / QR === */
  .room-card { text-align:center; }
  .code-big { font-size:30px; font-weight:800; letter-spacing:5px; color:#fff; background:#0f172a; border:1px dashed #475569; border-radius:10px; padding:14px; margin:6px 0; }
  body.teacher .code-big { background:#072019; border-color:#1d6152; }
  .qr-img { width:170px; height:170px; background:#fff; border-radius:10px; padding:8px; margin:10px auto; display:block; }
  .copy-row { display:flex; gap:8px; }

  /* === 그룹 === */

  body.student .group-head { color:#c4b5fd; }
  .grouptag { background:#4c1d95; color:#c4b5fd; }
  body.teacher .grouptag { background:#064e3b; color:#6ee7b7; }

</style>

<body class="login">
<div class="app" id="app"></div>

<script>
/* ============================================================
   블록체인 채굴 게임 (서버리스 멀티 디바이스 버전)
   ------------------------------------------------------------
   ● Firebase 불필요. 가입/API 키 없이 무료 공개 JSON 저장소
     (jsonblob.com)에 "방(room)"을 만들어 여러 스마트폰이
     같은 게임에 접속합니다.
   ● 교수자가 방을 만들면 [방 코드 + QR]이 생성됩니다.
     학생은 코드 입력(또는 QR 스캔)으로 참여합니다.
   ● 실제 수업(여러 기기)에서 쓰려면 이 HTML 파일을 웹에
     올려(예: GitHub Pages, 학교 서버, 공유 호스팅) 그 주소를
     학생들이 열도록 하세요. 같은 파일을 각자 내려받아 열고
     '방 코드'만 공유해도 동작합니다.
   ● 네트워크 연결이 안 되면 자동으로 '오프라인(이 기기 전용)'
     모드로 전환되어 단독 테스트가 가능합니다.
   ============================================================ */

/* ---------- 동기화(SYNC) 레이어 ---------- */
const SYNC = {
  base: "https://jsonblob.com/api/jsonBlob",
  roomId: null,         // 방 코드(= 저장소 blob id)
  mode: "offline",      // "cloud" | "offline"
};
const LS_ROOM   = "bcmine_room";        // 마지막 방 코드 기억
const LS_SESS   = "bcmine_session";     // 로그인 세션 기억(새로고침 유지)
const LS_PW     = "bcmine_teacherpw";   // 교수자 비밀번호(이 기기에만 저장, 공유 안 함)
const TEACHER_INIT_PW = "dfm";

function offlineKey(){ return "bcmine_offline_" + (SYNC.roomId || "local"); }
function myLocalKey(){ return "bcmine_mysubs_" + (SYNC.roomId||"local") + "_" + (session.sid||"x"); }

/* ---------- 룩업표 ---------- */
const LOOKUP = {};
for (let i=0;i<26;i++){ LOOKUP[String.fromCharCode(65+i)] = 65+i; }

/* ---------- 공유 데이터 모델 ----------
   공유 문서에는 비밀번호를 저장하지 않습니다(공개 저장소 보호).
   포인트는 저장하지 않고 제출 기록에서 항상 재계산합니다(충돌 방지). */
function defaultDB(){
  return {
    v: 0,                                   // 버전(쓰기마다 증가)
    school: "",
    teacherName: "",
    startedAt: null,
    config: { totalBlocks:8, scoreMode:3, nonceMax:3, groupSize:0 },
    started:false,
    currentBlock:0,
    genesisPrev:212,
    blocks:[],          // {idx,course,student,grade,prevHash,hash,correctNonce,correctHash,open}
    students:{},        // sid -> {name, joinedAt}
    submissions:[],     // {block,name,sid,hash,nonce,correct,time}  (append-only)
    groups:{ enabled:false, size:0, count:0, assignment:{}, dividedAt:null }, // assignment: sid->그룹번호
  };
}
let DB = defaultDB();
let myLocalSubs = [];   // 학생: 내가 제출한 기록(자가복구용)

/* ---------- 저장소 통신 ---------- */
async function createRoom(initial){
  try{
    const res = await fetch(SYNC.base, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify(initial)
    });
    if(!res.ok) return null;
    const loc = res.headers.get("Location") || res.headers.get("X-jsonblob") || res.headers.get("x-jsonblob");
    if(!loc) return null;
    return loc.split("/").pop();
  }catch(e){ return null; }
}
async function fetchRoom(id){
  const res = await fetch(SYNC.base + "/" + id, { headers:{ "Accept":"application/json" }, cache:"no-store" });
  if(!res.ok) throw new Error("fetch "+res.status);
  return await res.json();
}
async function putRoom(id, db){
  const res = await fetch(SYNC.base + "/" + id, {
    method:"PUT",
    headers:{ "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify(db)
  });
  return res.ok;
}

/* ---------- 정규화 ---------- */
function arr(x){ if(!x) return []; if(Array.isArray(x)) return x.filter(e=>e!=null); return Object.values(x); }
function normalize(v){
  const d = Object.assign(defaultDB(), v||{});
  d.config = Object.assign({totalBlocks:8,scoreMode:3,nonceMax:3,groupSize:0}, v && v.config || {});
  d.blocks = arr(v && v.blocks);
  d.submissions = arr(v && v.submissions);
  d.students = (v && v.students) || {};
  d.groups = Object.assign({enabled:false,size:0,count:0,assignment:{},dividedAt:null}, v && v.groups || {});
  if(!d.groups.assignment) d.groups.assignment = {};
  return d;
}

/* ============================================================
   해시 로직
   ============================================================ */
function letterVal(ch){ if(!ch) return 0; return LOOKUP[ch.toUpperCase()] || 0; }
function lastTwo(n){ return Math.abs(n)%100; }
function calcHash(block, nonce){
  const a = letterVal((block.course||"").trim()[0]);
  const b = letterVal((block.student||"").trim()[0]);
  const c = letterVal((block.grade||"").trim()[0]);
  const prevTwo = lastTwo(block.prevHash);
  return { hash: nonce + a + b + c - prevTwo, a, b, c, prevTwo };
}
function findCorrectNonce(block, nonceMax){
  const max = Math.max(3, nonceMax||3);
  for(let n=1;n<=max;n++){
    const r = calcHash(block,n);
    if(r.hash % 3 === 0) return { nonce:n, hash:r.hash };
  }
  return null;
}

/* ============================================================
   포인트/순위 (제출기록에서 재계산 — 저장하지 않음)
   ============================================================ */
function scoreTable(){
  const m = DB.config.scoreMode;
  return m===1?[1]:m===2?[2,1]:[3,2,1];
}
function computePoints(){
  const pts = {};
  Object.keys(DB.students).forEach(sid=>pts[sid]=0);
  const table = scoreTable();
  for(let b=1;b<=DB.config.totalBlocks;b++){
    const correct = DB.submissions.filter(s=>s.block===b && s.correct).sort((a,b)=>a.time-b.time);
    correct.forEach((s,i)=>{ pts[s.sid] = (pts[s.sid]||0) + (table[i]||0); });
  }
  return pts;
}
function awardedFor(s){
  if(!s.correct) return 0;
  const table = scoreTable();
  const correct = DB.submissions.filter(x=>x.block===s.block && x.correct).sort((a,b)=>a.time-b.time);
  const rank = correct.findIndex(x=>x.sid===s.sid);
  return table[rank]||0;
}
function rankArray(){
  const pts = computePoints();
  return Object.entries(DB.students)
    .map(([sid,v])=>({ sid, name:v.name, points:pts[sid]||0, group:DB.groups.assignment[sid]||0 }))
    .sort((a,b)=>b.points-a.points || a.name.localeCompare(b.name));
}
/* 그룹별 순위 {그룹번호: [정렬된 학생...]} */
function groupedRank(){
  const all = rankArray();
  const out = {};
  all.forEach(p=>{ const g = p.group||0; (out[g]=out[g]||[]).push(p); });
  Object.values(out).forEach(list=>list.sort((a,b)=>b.points-a.points));
  return out;
}

/* ============================================================
   동기화 1회 (역할 기반 병합)
   - 교수자: 구조 필드의 권한자. 원격의 학생/제출만 흡수해 보관.
   - 학생: 원격(교수자의 최신 구조)을 채택하고, 내 명단/내 제출만 보장.
   ============================================================ */
let pushPending = false;
async function syncOnce(forcePush){
  if(SYNC.mode!=="cloud"){ loadOffline(); render(); return; }
  let remote;
  try{ remote = normalize(await fetchRoom(SYNC.roomId)); }
  catch(e){ render(); return; }   // 일시적 실패는 그냥 통과

  let changed = false;

  if(session.role==="teacher"){
    // 원격의 학생/제출 흡수(합집합)
    Object.keys(remote.students).forEach(sid=>{
      if(!DB.students[sid]){ DB.students[sid]=remote.students[sid]; changed=true; }
    });
    remote.submissions.forEach(s=>{
      if(!DB.submissions.some(x=>x.block===s.block && x.sid===s.sid)){ DB.submissions.push(s); changed=true; }
    });
    // 그룹 분할 후 들어온 늦은 참여자 자동 배정(가장 적은 그룹)
    if(autoAssignLate()) changed = true;
    if(forcePush) changed = true;
  } else {
    // 학생: 교수자 구조를 그대로 채택
    const base = remote;
    if(!base.students[session.sid]){
      base.students[session.sid] = { name:session.name, joinedAt:Date.now() }; changed = true;
    } else if(base.students[session.sid].name !== session.name){
      base.students[session.sid].name = session.name; changed = true;
    }
    myLocalSubs.forEach(ls=>{
      if(!base.submissions.some(s=>s.block===ls.block && s.sid===ls.sid)){ base.submissions.push(ls); changed = true; }
    });
    DB = base;
  }

  if(changed){
    DB.v = (remote.v||0) + 1;
    try{ await putRoom(SYNC.roomId, DB); }catch(e){}
  }
  try{ localStorage.setItem(offlineKey(), JSON.stringify(DB)); }catch(e){}
  render();
}
function autoAssignLate(){
  if(!DB.groups.enabled || !DB.groups.count) return false;
  const counts = {};
  for(let g=1; g<=DB.groups.count; g++) counts[g]=0;
  Object.values(DB.groups.assignment).forEach(g=>{ if(counts[g]!=null) counts[g]++; });
  let changed=false;
  Object.keys(DB.students).forEach(sid=>{
    if(!DB.groups.assignment[sid]){
      let min=1; for(let g=2; g<=DB.groups.count; g++){ if(counts[g]<counts[min]) min=g; }
      DB.groups.assignment[sid]=min; counts[min]++; changed=true;
    }
  });
  return changed;
}
/* 즉시 반영 푸시 */
async function pushNow(){
  if(SYNC.mode!=="cloud"){ saveOffline(); render(); return; }
  await syncOnce(true);
}
function loadOffline(){
  try{ const d = JSON.parse(localStorage.getItem(offlineKey())); if(d) DB = normalize(d); }catch(e){}
}
function saveOffline(){
  DB.v = (DB.v||0)+1;
  try{ localStorage.setItem(offlineKey(), JSON.stringify(DB)); }catch(e){}
}

function chainHTML(forRole){
  const total = DB.config.totalBlocks;
  let blocks = "";
  for(let i=1;i<=total;i++){
    const b = DB.blocks[i-1];
    let cls, header, body;
    if(b){
      const isCur = (i===DB.currentBlock && b.open);
      cls = isCur ? "current" : "mined";
      const lock = isCur ? '⛏️' : '🔒';
      header = `<div class="bh"><span># ${i}</span><span class="lock">${lock}</span></div>`;
      const showHash = (forRole==="teacher") || (!b.open);
      body = `
        <div class="bl"><span class="lk2">과목</span><span class="vv">${esc(b.course)}</span></div>
        <div class="bl"><span class="lk2">공개키</span><span class="vv">${esc(b.student)}</span></div>
        <div class="bl"><span class="lk2">성적</span><span class="vv">${esc(b.grade)}</span></div>
        <div class="bl"><span class="lk2">정답해시</span><span class="vv hashval">${showHash ? (b.correctHash ?? '-') : '🔒채굴중'}</span></div>`;
    } else {
      cls = "pending";
      header = `<div class="bh"><span># ${i}</span><span class="lock">⏳</span></div>`;
      body = `<div style="text-align:center;padding:14px 0;color:#64748b">미출제</div>`;
    }
    blocks += `<div class="chain-block ${cls}">${header}${body}</div>`;
    if(i<total) blocks += `<div class="chain-link">⛓️</div>`;
  }
  return `<div class="chain-wrap"><div class="chain">${blocks}</div></div>`;
}

      <div class="hint">이전 해시 끝 2자리: <b>${lastTwo(prevHashShow)}</b> (자동 연결)</div>
      <button class="ghost" onclick="regenRand()">🎲 다시 랜덤 생성</button>
      <button class="primary" onclick="createBlock()">📢 블록 출제 (학생에게 공개)</button>
    </div>`;
  }

  const lookupCard = `
  <div class="card">
    <h2>🔢 룩업표 & 공식</h2>
    <div class="formula">Hash = Nonce + a + b + c − (이전 해시 끝 2자리)<br>
      <span style="font-size:11px;color:#86d9c5">a=과목 첫글자, b=학생키 첫글자, c=성적 / 정답은 Hash가 3의 배수가 되는 Nonce(1∼${cfg.nonceMax})</span></div>
    <div class="lookup">
      ${Object.keys(LOOKUP).map(k=>`<div class="lk"><div class="c">${k}</div><div class="n">${LOOKUP[k]}</div></div>`).join("")}
    </div>
  </div>`;

  return statusCard + formCard + lookupCard;
}

function createBlock(){
  const course = document.getElementById("c_course").value.trim();
  const student = document.getElementById("c_student").value.trim();
  const grade = document.getElementById("c_grade").value.trim();
  if(!course || !student || !grade){ toast("모든 항목을 입력하세요"); return; }
  if(!DB.started){ DB.started=true; DB.currentBlock=1; DB.startedAt=Date.now(); }
  const idx = DB.currentBlock;
  const prevHash = idx===1 ? DB.genesisPrev : DB.blocks[idx-2].hash;
  const blockObj = { idx, course, student, grade, prevHash, hash:null, open:true };
  const correct = findCorrectNonce(blockObj, DB.config.nonceMax);
  blockObj.hash = correct ? correct.hash : calcHash(blockObj,1).hash;
  blockObj.correctNonce = correct ? correct.nonce : null;
  blockObj.correctHash = correct ? correct.hash : null;
  DB.blocks[idx-1] = blockObj;
  pendingRand = null;
  pushNow();
  toast(`블록 #${idx} 출제 완료! 학생들이 채굴을 시작합니다.`);
  renderTeacher();
}

function closeBlock(){
  const cur = DB.currentBlock;
  if(DB.blocks[cur-1]) DB.blocks[cur-1].open = false;
  DB.currentBlock = cur + 1;
  pendingRand = null;
  if(DB.currentBlock > DB.config.totalBlocks){ toast("모든 블록 출제 완료! 게임이 종료되었습니다."); teacherTab="final"; }
  else { toast(`블록 #${cur} 마감. 다음 블록을 출제하세요.`); }
  pushNow();
  renderTeacher();
}

/* ----- 제출결과 탭 ----- */
function teacherResultsHTML(){
  if(!DB.started) return `<div class="card"><div class="empty">아직 게임이 시작되지 않았습니다.</div></div>`;
  const list = [];
  for(let i=1;i<=DB.config.totalBlocks;i++){
    const subs = DB.submissions.filter(s=>s.block===i).sort((a,b)=>a.time-b.time);
    if(DB.blocks[i-1]) list.push({i,subs,block:DB.blocks[i-1]});
  }
  if(list.length===0) return `<div class="card"><div class="empty">출제된 블록이 없습니다.</div></div>`;
  const pts = computePoints();
  return list.slice().reverse().map(({i,subs,block})=>{
    const isCur = i===DB.currentBlock && block.open;
    const correctList = subs.filter(s=>s.correct);
    return `
    <div class="card">
      <h2>${isCur?'<span class="status-dot dot-live"></span>':''}블록 #${i} ${isCur?'(진행중)':'<span class="badge gray">마감</span>'}</h2>
      <div class="hint" style="margin-bottom:8px">${esc(block.course)} · ${esc(block.student)} · 성적 ${esc(block.grade)} · 정답해시 <b style="color:#6ee7b7">${block.correctHash ?? '없음'}</b></div>
      ${subs.length===0 ? `<div class="empty">제출 없음</div>` : `
      <div class="scroll-x"><table>
        <tr><th>순위</th><th>이름(학번)</th>${DB.groups.enabled?'<th>조</th>':''}<th>제출해시</th><th>정답</th><th>획득</th><th>총점</th></tr>
        ${subs.map((s,ix)=>{
          let medal = "";
          if(s.correct){ const cr = correctList.findIndex(x=>x.sid===s.sid)+1; medal = cr===1?'🥇':cr===2?'🥈':cr===3?'🥉':''; }
          return `<tr>
            <td>${medal?'<span class="medal">'+medal+'</span>':(ix+1)}</td>
            <td>${esc(s.name)}<br><span style="font-size:10px;color:#94a3b8">${esc(s.sid)}</span></td>
            ${DB.groups.enabled?`<td>${DB.groups.assignment[s.sid]?DB.groups.assignment[s.sid]+'조':'-'}</td>`:''}
            <td>${s.hash}</td>
            <td>${s.correct?'<span class="badge green">정답</span>':'<span class="badge red">오답</span>'}</td>
            <td><span class="pill">+${awardedFor(s)}</span></td>
            <td>${pts[s.sid]||0}</td>
          </tr>`;
        }).join("")}
      </table></div>`}
    </div>`;
  }).join("");
}

function saveConfig(){
  const blocks = parseInt(document.getElementById("cfg_blocks").value);
  const score = parseInt(document.getElementById("cfg_score").value);
  const nonce = parseInt(document.getElementById("cfg_nonce").value);
  if(!DB.started){ DB.config.totalBlocks = blocks; DB.config.scoreMode = score; }
  DB.config.nonceMax = nonce;   // 난이도는 진행 중에도 변경 가능
  pushNow();
  toast("설정이 저장되었습니다.");
  renderTeacher();
}
function divideGroups(){
  const size = parseInt(document.getElementById("cfg_groupsize").value);
  if(!size || size<1){ toast("그룹 인원을 1 이상으로 설정하세요"); return; }
  const sids = Object.keys(DB.students);
  if(sids.length===0){ toast("참여 학생이 없습니다"); return; }
  for(let i=sids.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [sids[i],sids[j]]=[sids[j],sids[i]]; }
  const G = Math.ceil(sids.length/size);
  const assignment={};
  sids.forEach((sid,i)=>{ assignment[sid]=(i%G)+1; });   // 섞은 뒤 라운드로빈 → 균등 분할
  DB.config.groupSize = size;
  DB.groups = { enabled:true, size, count:G, assignment, dividedAt:Date.now() };
  pushNow();
  toast(`${G}개 그룹으로 무작위 분할했습니다.`);
  renderTeacher();
}
function clearGroups(){
  DB.groups = { enabled:false, size:0, count:0, assignment:{}, dividedAt:null };
  pushNow();
  toast("그룹을 해제했습니다.");
  renderTeacher();
}
function changePw(){
  const np = document.getElementById("cfg_pw").value.trim();
  if(!np){ toast("패스워드를 입력하세요"); return; }
  localStorage.setItem(LS_PW, np);
  toast("패스워드가 변경되었습니다.");
  renderTeacher();
}
function confirmReset(){
  if(confirm("정말 모든 게임 데이터를 초기화하시겠습니까? (방 코드는 유지)")){
    const school = DB.school, name = DB.teacherName;
    DB = defaultDB();
    DB.school = school; DB.teacherName = name;
    pendingRand = null;
    pushNow();
    toast("초기화 완료");
    teacherTab="room";
    renderTeacher();
  }
}

function downloadExcel(){
  const all = rankArray();
  const pts = computePoints();
  const esc2 = (s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body>`;

  // 1) 게임 정보
  html += `<table border="1"><tr><th colspan="2">블록체인 채굴 게임 결과</th></tr>`;
  html += `<tr><td>고등학교명</td><td>${esc2(DB.school)}</td></tr>`;
  html += `<tr><td>교수자</td><td>${esc2(DB.teacherName)}</td></tr>`;
  html += `<tr><td>게임 시작 일시</td><td>${DB.startedAt?fmtDate(DB.startedAt):'-'}</td></tr>`;
  html += `<tr><td>총 블록 수</td><td>${DB.config.totalBlocks}</td></tr>`;
  html += `<tr><td>난이도(Nonce 범위)</td><td>1∼${DB.config.nonceMax}</td></tr>`;
  html += `<tr><td>점수 배분 방식</td><td>${DB.config.scoreMode===1?'1등 1점':DB.config.scoreMode===2?'1등2/2등1':'1등3/2등2/3등1'}</td></tr>`;
  html += `<tr><td>참여 학생 수</td><td>${Object.keys(DB.students).length}</td></tr>`;
  html += `<tr><td>총 제출 건수</td><td>${DB.submissions.length}</td></tr>`;
  html += `<tr><td>그룹 분할</td><td>${DB.groups.enabled?`${DB.groups.count}개 그룹 (그룹당 최대 ${DB.groups.size}명, 분할 ${DB.groups.dividedAt?fmtDate(DB.groups.dividedAt):'-'})`:'미사용'}</td></tr>`;
  html += `</table><br>`;

  // 2) 전체 순위
  html += `<table border="1"><tr><th>순위</th><th>이름</th><th>학번</th>${DB.groups.enabled?'<th>그룹</th>':''}<th>점수</th></tr>`;
  all.forEach((s,i)=>{
    html += `<tr><td>${i+1}</td><td>${esc2(s.name)}</td><td>${esc2(s.sid)}</td>${DB.groups.enabled?`<td>${s.group?s.group+'조':'-'}</td>`:''}<td>${s.points}</td></tr>`;
  });
  html += `</table><br>`;

  // 3) 그룹별 순위 (그룹 사용 시)
  if(DB.groups.enabled){
    const gr = groupedRank();
    const groups = Object.keys(gr).map(Number).filter(x=>x>0).sort((a,b)=>a-b);
    html += `<table border="1"><tr><th colspan="4">그룹별 순위</th></tr>`;
    groups.forEach(g=>{
      html += `<tr><th colspan="4">${g}조 (${gr[g].length}명)</th></tr>`;
      html += `<tr><th>그룹내순위</th><th>이름</th><th>학번</th><th>점수</th></tr>`;
      gr[g].forEach((s,i)=>{ html += `<tr><td>${i+1}</td><td>${esc2(s.name)}</td><td>${esc2(s.sid)}</td><td>${s.points}</td></tr>`; });
    });
    html += `</table><br>`;

    // 그룹 구성표
    html += `<table border="1"><tr><th>그룹</th><th>이름</th><th>학번</th><th>점수</th></tr>`;
    Object.entries(DB.students).forEach(([sid,v])=>{
      const g = DB.groups.assignment[sid];
      html += `<tr><td>${g?g+'조':'-'}</td><td>${esc2(v.name)}</td><td>${esc2(sid)}</td><td>${pts[sid]||0}</td></tr>`;
    });
    html += `</table><br>`;
  }

  // 4) 블록별 정보
  html += `<table border="1"><tr><th>블록#</th><th>과목</th><th>학생공개키</th><th>성적</th><th>이전해시끝2자리</th><th>정답Nonce</th><th>정답해시</th></tr>`;
  DB.blocks.forEach(b=>{ if(!b) return;
    html += `<tr><td>${b.idx}</td><td>${esc2(b.course)}</td><td>${esc2(b.student)}</td><td>${esc2(b.grade)}</td><td>${lastTwo(b.prevHash)}</td><td>${b.correctNonce??'-'}</td><td>${b.correctHash??'-'}</td></tr>`;
  });
  html += `</table><br>`;

  // 5) 전체 제출 내역
  html += `<table border="1"><tr><th>블록#</th><th>이름</th><th>학번</th>${DB.groups.enabled?'<th>그룹</th>':''}<th>Nonce</th><th>제출해시</th><th>정답여부</th><th>획득점수</th><th>제출시각</th></tr>`;
  DB.submissions.slice().sort((a,b)=>a.block-b.block||a.time-b.time).forEach(s=>{
    const g = DB.groups.assignment[s.sid];
    html += `<tr><td>${s.block}</td><td>${esc2(s.name)}</td><td>${esc2(s.sid)}</td>${DB.groups.enabled?`<td>${g?g+'조':'-'}</td>`:''}<td>${s.nonce}</td><td>${s.hash}</td><td>${s.correct?'정답':'오답'}</td><td>${awardedFor(s)}</td><td>${fmtDate(s.time)}</td></tr>`;
  });
  html += `</table></body></html>`;

  const blob = new Blob(["\ufeff"+html], {type:"application/vnd.ms-excel"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `블록체인게임결과_${(DB.school||'game')}_${dateStr}.xls`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("Excel 파일 다운로드 시작!");
}

/* ============================================================
   학생 페이지
   ============================================================ */
let studentNonce = null;
function renderStudent(){
  const pts = computePoints();
  const myPts = pts[session.sid] || 0;
  const myGroup = DB.groups.enabled ? (DB.groups.assignment[session.sid]||null) : null;
  const cur = DB.currentBlock;
  const total = DB.config.totalBlocks;
  const block = (DB.started && cur>=1 && cur<=total) ? DB.blocks[cur-1] : null;
  const finished = DB.started && cur>total;
  const nMax = DB.config.nonceMax;
  const mySub = block ? DB.submissions.find(s=>s.block===cur && s.sid===session.sid) : null;
  const alreadySubmitted = !!mySub;

  let blockCard = "";
  if(!DB.started){
    blockCard = `<div class="card"><div class="empty"><span class="status-dot dot-wait"></span>아직 문제가 출제되지 않았습니다.<br>교수자의 출제를 기다려주세요.</div></div>`;
  } else if(finished){
    blockCard = `<div class="card"><h2>🏁 게임 종료</h2><div class="empty">모든 블록 채굴이 종료되었습니다.<br>아래에서 최종 결과를 확인하세요!</div></div>` + finalResultHTML("student");
  } else if(!block || !block.open){
    blockCard = `<div class="card"><div class="empty"><span class="status-dot dot-wait"></span>다음 블록 출제를 기다리는 중...</div></div>`;
  } else {
    blockCard = `
    <div class="card">
      <h2><span class="status-dot dot-live"></span>블록 #${cur} / ${total} 채굴 중 <span class="badge amber">Nonce 1∼${nMax}</span></h2>
      <div class="block-info">
        <div class="row"><span class="k">과목 (Course)</span><span class="v">${esc(block.course)}</span></div>
        <div class="row"><span class="k">학생 (Public Key)</span><span class="v">${esc(block.student)}</span></div>
        <div class="row"><span class="k">성적 (Grade)</span><span class="v">${esc(block.grade)}</span></div>
        <div class="row"><span class="k">이전 해시 끝2자리</span><span class="v">${lastTwo(block.prevHash)}</span></div>
      </div>
      <div class="formula">Hash = Nonce + a + b + c − ${lastTwo(block.prevHash)}<br>
        <span style="font-size:11px;color:#64748b">a, b, c 값은 룩업표를 참고해 직접 계산하세요 · 정답은 Hash가 3의 배수</span>
      </div>
      ${alreadySubmitted ? `
        <div class="calc-display">
          <div class="lbl" style="font-size:12px;color:#94a3b8">내 제출 (Nonce ${mySub.nonce})</div>
          <div class="big ${mySub.correct?'ok':'no'}">${mySub.hash}</div>
          <div>${mySub.correct?'<span class="badge green">정답! +'+awardedFor(mySub)+'점</span>':'<span class="badge red">오답</span>'}</div>
        </div>
        <div class="hint">이미 이 블록에 제출했습니다. 다음 블록을 기다려주세요.</div>
      ` : `
        <label>Nonce 선택 (1∼${nMax})</label>
        <div class="nonce-pick">
          ${Array.from({length:nMax},(_,k)=>k+1).map(n=>`<div class="np ${studentNonce===n?'active':''}" onclick="pickNonce(${n})">${n}</div>`).join("")}
        </div>
        ${studentNonce ? `<div class="hint" style="text-align:center;color:#a5b4fc">Nonce <b>${studentNonce}</b> 선택됨 — 직접 계산 후 제출하세요.</div>` : `<div class="hint" style="text-align:center">Nonce를 선택한 뒤 제출 버튼을 누르세요.</div>`}
        <button class="primary" onclick="submitHash()" ${studentNonce?'':'disabled'}>해시값 제출</button>
        <div class="hint">제출 전까지 정답 여부는 표시되지 않습니다. 정답자 중 빨리 제출한 순서로 포인트가 부여됩니다.</div>
      `}
    </div>`;
  }

  // 내 그룹 랭킹(그룹 사용 시)
  let groupRankCard = "";
  if(myGroup){
    const gr = groupedRank()[myGroup] || [];
    groupRankCard = `<div class="card"><h2>🧩 내 그룹(${myGroup}조) 랭킹</h2><div class="scroll-x">
      <table><tr><th>순위</th><th>이름(학번)</th><th>점수</th></tr>
      ${gr.map((s,i)=>{
        const me = s.sid===session.sid;
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        return `<tr class="${i<3?'rank-'+(i+1):''}"><td><span class="medal">${medal}</span></td>
          <td>${esc(s.name)}${me?' <span class="badge purple">나</span>':''} <span style="font-size:10px;color:#94a3b8">(${esc(s.sid)})</span></td>
          <td><b>${s.points}점</b></td></tr>`;
      }).join("")}
      </table></div></div>`;
  }

  const lookupCard = `
  <div class="card">
    <h2>🔢 룩업표</h2>
    <div class="lookup">
      ${Object.keys(LOOKUP).map(k=>`<div class="lk"><div class="c">${k}</div><div class="n">${LOOKUP[k]}</div></div>`).join("")}
    </div>
  </div>`;

  app.innerHTML = `
  <div class="header">
    <h1>🔗 블록체인 채굴 게임</h1>
    <div class="sub">채굴자(Miner) · 해시를 찾아 블록을 완성하세요!</div>
    <div class="userbar">
      <span>${esc(session.name)} (${esc(session.sid)})</span>
      ${myGroup?`<span class="room-chip">${myGroup}조</span>`:''}
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="content">
    <div class="my-points">
      <div class="num">${myPts}</div>
      <div class="lbl">내 누적 포인트</div>
      ${myGroup?`<div class="gtag"><span class="badge grouptag">🧩 ${myGroup}조 소속</span></div>`:''}
    </div>
    ${chainHTML("student")}
    ${blockCard}
    ${groupRankCard}
    ${lookupCard}
  </div>`;
}
function pickNonce(n){ studentNonce=n; renderStudent(); }
function submitHash(){
  const cur = DB.currentBlock;
  const block = DB.blocks[cur-1];
  if(!block || !block.open){ toast("현재 제출 가능한 블록이 없습니다."); return; }
  if(DB.submissions.some(s=>s.block===cur && s.sid===session.sid)){ toast("이미 제출했습니다."); return; }
  if(!studentNonce){ toast("Nonce를 선택하세요"); return; }
  const calc = calcHash(block, studentNonce);
  const correct = (calc.hash % 3 === 0);
  const sub = { block:cur, name:session.name, sid:session.sid, hash:calc.hash, nonce:studentNonce, correct, time:Date.now() };
  DB.submissions.push(sub);
  myLocalSubs.push(sub);
  try{ localStorage.setItem(myLocalKey(), JSON.stringify(myLocalSubs)); }catch(e){}
  studentNonce = null;
  pushNow();
  toast(correct ? "정답 제출! 포인트가 배분되었습니다." : "제출 완료 (오답)");
  renderStudent();
}

/* ============================================================
   유틸
   ============================================================ */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function pad(n){ return n<10?'0'+n:''+n; }
function fmtDate(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
let toastTimer=null;
function toast(msg){
  const old=document.querySelector(".toast"); if(old) old.remove();
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),2600);
}

/* 주기 동기화 (입력 중에는 화면 갱신 보류) */
setInterval(()=>{
  if(!session.role) return;
  const active = document.activeElement;
  const typing = active && (active.tagName==="INPUT" || active.tagName==="SELECT");
  if(SYNC.mode==="cloud"){
    // 클라우드는 항상 GET/병합하되, 타이핑 중이면 render는 syncOnce 내부에서 일어나므로
    // 입력 포커스를 잃지 않도록 타이핑 중엔 동기화를 건너뜀
    if(!typing) syncOnce(false);
  } else {
    if(!typing){ loadOffline(); render(); }
  }
}, 3000);

/* 오프라인: 같은 브라우저 다른 탭 동기화 */
window.addEventListener("storage",(e)=>{
  if(SYNC.mode!=="cloud" && e.key===offlineKey()){ loadOffline(); render(); }
});

/* ============================================================
   시작
   ============================================================ */
(async function start(){
  // URL 해시에서 방 코드 추출 (#room=XXXX)
  const m = location.hash.match(/room=([^&]+)/);
  if(m){ prefillRoom = decodeURIComponent(m[1]); }

  // 세션/방 복원
  try{
    const sess = JSON.parse(localStorage.getItem(LS_SESS));
    const room = localStorage.getItem(LS_ROOM);
    if(sess && sess.role){
      session = sess;
      if(room){
        SYNC.roomId = room;
        try{ const r = await fetchRoom(room); if(r){ SYNC.mode="cloud"; DB=normalize(r); } else { SYNC.mode="offline"; loadOffline(); } }
        catch(e){ SYNC.mode="offline"; loadOffline(); }
      } else { SYNC.mode="offline"; loadOffline(); }
      if(session.role==="student"){
        try{ myLocalSubs = JSON.parse(localStorage.getItem(myLocalKey())) || []; }catch(e){ myLocalSubs=[]; }
      }
    }
  }catch(e){}

  render();
  if(session.role){ syncOnce(false); }
})();
</script>
